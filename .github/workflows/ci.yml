name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: MCP server (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lol-mcp-server
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check src

  client:
    name: Web client (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
